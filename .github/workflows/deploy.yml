name: Deploy to GCE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to deploy (e.g. v1.2.3)'
        required: true
        default: 'v0.0.0'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    env:
      # Tag push → use tag name (e.g. v0.3.0) so Caddy/badge show the release.
      # Main push → use the commit SHA; dispatch → use user input.
      DEPLOY_REF: ${{ github.event.inputs.ref || (startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha) }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          envs: DEPLOY_REF
          script: |
            set -euo pipefail
            cd ${{ secrets.GCE_APP_DIR }}
            echo "Deploying ref: $DEPLOY_REF"
            git fetch --all --tags --prune --force
            git checkout --detach "$DEPLOY_REF"
            export APP_VERSION="$DEPLOY_REF"
            docker compose pull || true
            docker compose up -d --build --remove-orphans
            docker image prune -f
